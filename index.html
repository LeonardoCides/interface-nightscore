<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightscore - Assessoria</title>
    <link rel="stylesheet" href="/public/css/main.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div id="event-page"></div>

    <script>
        function load() {
            const data = localStorage.getItem('selectedEvent');
            
            if (!data) {
                window.location.href = 'index.html';
                return;
            }

            const ev = JSON.parse(data);
            const nota = ev.nota || "4.8";
            const votos = ev.votos || Math.floor(Math.random() * (40 - 15) + 15);
            
            document.getElementById('event-page').innerHTML = `
                <div class="hero-viewport">
                    <a href="index.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> Voltar</a>
                    <img src="${ev.imagem_url}" class="hero-img">
                    <div class="vignette-ultra"></div>
                    
                    <div class="main-content">
                        <div class="assessoria-label">
                            <i class="fa-solid fa-shield-check"></i> Curadoria Nightscore <i class="fa-solid fa-circle-check" style="font-size: 10px; margin-left: 5px;"></i>
                        </div>
                        <h1 class="event-title">${ev.titulo}</h1>
                        
                        <div class="rating-row">
                            <span class="rating-header">Nota da Assessoria</span>
                            <div class="rating-stats">
                                <span class="score">${nota}</span>
                                <div class="stars-purple">
                                    ${Array(5).fill(0).map((_, i) => `<i class="fa-solid fa-star" style="opacity: ${i < Math.floor(nota) ? 1 : 0.15}"></i>`).join('')}
                                </div>
                                <span style="color:var(--text-muted); font-size: 0.7rem; font-weight: 800;">${votos} VERIFICAÇÕES</span>
                            </div>
                        </div>

                        <div class="description-box">
                            ${ev.descricao || 'Nossa assessoria validou a infraestrutura, segurança e curadoria artística deste evento.'}
                        </div>

                        <div class="meta-grid">
                            <span><i class="fa-solid fa-calendar"></i> ${ev.data}</span>
                            <span><i class="fa-solid fa-location-arrow"></i> ${ev.local}</span>
                        </div>

                        <button onclick="avaliar()" class="btn-checkin">
                            <i class="fa-solid fa-ranking-star"></i> Avaliar Organização
                        </button>
                    </div>
                </div>
            `;
        }

        function avaliar() {
            const n = prompt("Como você avalia este evento? (1 a 5)");
            if (n >= 1 && n <= 5) alert("Avaliação enviada!");
        }

        load();
    </script>
    <script src="/public/js/api.js"></script>
    <script src="/public/js/ui.js"></script>
    <script src="/public/js/events.js"></script>
    <script src="/public/js/script.js"></script>
    <script src="/public/js/cursor.js"></script>>
</body>
</html>
